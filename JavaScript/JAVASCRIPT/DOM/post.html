<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dikshya Post</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .post {
            background: white;
            width: 400px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .post img {
            width: 100%;
            border-radius: 10px;
        }

        .username {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        button {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            color: blue;
        }
    </style>
</head>
<body>

<div class="post">
    <div class="username">Dikshya Runuwal</div>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="post image">

    <p>Enjoying the view 🌊✨</p>

   <div class="actions">
    <button id="likeBtn" onclick="increaselike()">👍 <span id="likeCount">0</span></button>
    <button id="dislikeBtn" onclick="increaseDislike()">👎 <span id="dislikeCount">0</span></button>
    <button id="heartBtn" onclick="increaseHeart()">❤️ <span id="heartCount">0</span></button>
</div>
</div>

<script src="./DOM/dom.js"></script>

</body>
</html>
