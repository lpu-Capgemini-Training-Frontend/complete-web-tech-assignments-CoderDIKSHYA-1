    =========================
    CSS NOTES
    =========================

    🔹 CSS (Cascading Style Sheets) is a stylesheet language used to describe the presentation of a document written in HTML.

    🔹 Ways to add CSS in an HTML page:
    1. Inline CSS: Using the style attribute directly on an HTML element.
       Example: <p style="color: red;">This is a red paragraph.</p>
       Why using !important in CSS?
       The !important declaration in CSS is used to give a CSS property the highest priority, overriding any other declarations 
       for that property, regardless of specificity or source order. 
       It is typically used to ensure that a particular style is applied even 
       if there are conflicting styles elsewhere in the stylesheet or inline styles.
        However, it should be used sparingly, as it can make debugging and maintaining CSS more difficult.


    2. Internal CSS: Using a <style> tag within the <head> section of the HTML document.
       Example:
       selector {
           propertyName: value;
           propertyName: value;
       }
       <style>
           p {
               color: blue;
           }
       </style>

    3. External CSS: Linking to an external stylesheet using the <link> tag in the <head> section.
    why external css is recommended?
    External CSS is recommended for several reasons:
1. Separation of Concerns: External CSS allows you to separate the presentation (styling) from the content (HTML), 
making it easier to maintain and update your website.
2. Reusability: An external CSS file can be linked to multiple HTML documents,
 allowing you to apply the same styles across multiple pages without having to duplicate the CSS code.
3. Faster Load Times: Browsers can cache external CSS files, which can improve
 load times for subsequent visits to the website, as the CSS file will not need to be downloaded again.
4. Better Organization: Keeping CSS in a separate file helps keep your HTML
 cleaner and more organized, making it easier to read and understand the structure of your HTML document.    
       Example:
       <link rel="stylesheet" href="styles.css">

     Difference between style attribute and style tag in HTML:
1. Style Attribute: The style attribute is used to apply inline CSS directly to an HTML element

The style attribute is added to the opening tag of an HTML element and contains CSS properties and values
    that apply only to that specific element. 
    It has the highest priority in CSS and will override any other styles defined 
    in internal or external stylesheets for that element.
2. Style Tag: The style tag is used to define internal CSS within the <head> section of an HTML document
Example:

    }
</style>
The style tag allows you to write CSS rules that can be applied to multiple elements within the HTML

Priority of CSS:
1. Inline CSS (Highest Priority)
2. Internal CSS (Less Priority)
3. External CSS (Lowest Priority)
Why this is the priority order?
The priority order of CSS is determined by the specificity of the selectors and the source of the styles.
1. Inline CSS has the highest priority because it is applied directly to the HTML element using the style attribute. 
It overrides any other styles defined in internal or external stylesheets.
2. Internal CSS has less priority than inline CSS because it is defined within a <style> tag in the <head> section of the HTML document. 
It can be overridden by inline styles but will override external styles.
3. External CSS has the lowest priority because it is defined in a separate stylesheet and linked to the HTML document.
 It can be overridden by both inline and internal styles.
This priority order allows developers to have more control over the styling of their web pages,
 giving them the ability to override styles when necessary while maintaining a clear structure for their CSS.
 

 Does the sequence of CSS matter?
 Yes, the sequence of CSS does matter because it determines which styles are applied to an element when
