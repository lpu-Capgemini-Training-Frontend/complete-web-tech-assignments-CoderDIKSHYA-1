<!DOCTYPE html>
<html>
<head>
    <title>Paragraph Styling</title>
</head>
<body>

<h2>Paragraph Example</h2>

<p id="p1" style="color: red;">
    This is paragraph 1 using ID styling.
</p>

<p class="para" style="color: blue;">
    This is paragraph 2 using class styling.
</p>

<p class="para" style="font-size: 18px;">
    This is paragraph 3 with font size.
</p>

<p id="editable1" contenteditable="true" style="background-color: lightyellow;">
    You can edit this paragraph directly!
</p>

<p id="editable2" contenteditable="true" style="border: 1px solid black;">
    This paragraph is also editable.
</p>

</body>
</html>
