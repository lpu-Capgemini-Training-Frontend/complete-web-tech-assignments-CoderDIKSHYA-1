<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Tag vs Title Attribute</title>

    <!-- 
    =========================
    TITLE TAG vs TITLE ATTRIBUTE
    =========================

    🔹 1. <title> TAG
    → Defines the title of the webpage
    → Appears on the browser tab
    → Important for SEO (Search Engine Optimization)
    → Must be inside <head> section

    Example:
    <title>My Website</title>

    --------------------------------------------------

    🔹 2. title ATTRIBUTE
    → Provides extra information about an element
    → Shows as a tooltip when user hovers over element
    → Can be used on ANY HTML element (global attribute)

    Example:
    <p title="This is tooltip">Text</p>

    --------------------------------------------------

    🔹 KEY DIFFERENCE

    <title> TAG:
    ✔ Used for page title
    ✔ Placed inside <head>
    ✔ Visible on browser tab

    title ATTRIBUTE:
    ✔ Used for extra info
    ✔ Placed inside elements
    ✔ Visible as tooltip on hover

    --------------------------------------------------

    🔹 IMPORTANT NOTE
    Many beginners confuse both because of same name,
    but they are completely different in usage.

    -->
</head>

<body>

    <!-- title ATTRIBUTE example -->
    <!-- When you hover on this paragraph, tooltip "para1" will appear -->
    <p title="para1">This is a paragraph</p>

</body>
</html>
