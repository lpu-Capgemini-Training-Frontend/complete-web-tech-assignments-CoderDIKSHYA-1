<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Description List</title>

    <!-- 
    =========================
    DESCRIPTION LIST (DL) NOTES
    =========================

    🔹 WHAT IS A DESCRIPTION LIST?
    A description list is used to display terms and their descriptions.

    ✔ Unlike <ul> and <ol>, it does NOT use bullets or numbers
    ✔ It is mainly used for definitions, glossary, or key-value pairs

    --------------------------------------------------

    🔹 TAGS USED IN DESCRIPTION LIST

    1. <dl> → Description List container
    2. <dt> → Description Term (name/title)
    3. <dd> → Description Definition (details)

    --------------------------------------------------

    🔹 STRUCTURE

    <dl>
        <dt>Term</dt>
        <dd>Description</dd>
    </dl>

    --------------------------------------------------

    🔹 WHEN TO USE?
    - Definitions (dictionary style)
    - FAQs
    - Product details
    - Key-value data

    --------------------------------------------------

    🔹 DIFFERENCE FROM OTHER LISTS

    <ul> → Bullet list (unordered)
    <ol> → Numbered list (ordered)
    <dl> → Term + description format

    -->
</head>

<body>

    <!-- Heading -->
    <h4>Description List</h4>

    <!-- DESCRIPTION LIST START -->
    <dl>

        <!-- Term -->
        <dt>Android</dt>

        <!-- Description -->
        <dd>
            I want to purchase a samsung phone under budget 50000
        </dd>

        <!-- Another term -->
        <dt>Features</dt>

        <!-- Description -->
        <dd>
            Camera should be of 50mp.
        </dd>

        <!-- Another term -->
        <dt>Battery</dt>

        <!-- Description -->
        <dd>
            Long-lasting battery life of 5000mAh
        </dd>

    </dl>

</body>
</html>
