<!--
Pseudo-classes are used to define a special state of an element. For example, 
it can be used to style an element when a user mouses over it, or to style visited and unvisited links differently.
Some common use for pseudo-elements:

Style the first letter or first line, of an element
Insert content before or after an element
Style the markers of list items
Style the user-selected portion of an element
Style the viewbox behind a dialog box

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Selector</title>
    <link rel="stylesheet" href="/CSS/pseudoSelector.css">
</head>
<body>

<div id="btnexample">
    <button id="btn">Click Me</button>
</div>


</body>
</html>
