<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>lists using combinators</title>
<link rel="stylesheet" href="./Task02.css">
</head>

<body>

<!-- section for biryani ingredients 
we have used unordered list here  -->
<section>
    <h1>Ingredients for Biryani</h1>

    <!-- unordered list -list does need an order ,the default values is not a number or so -->
    <ul>
        <li>Rice</li>

        <li>Chicken
            <!-- nested list - this means a list  within a list is called as nested list  -->
            <ul>
                <li>Fried</li>
                <li>Grilled</li>
                <li>Roasted</li>
            </ul>
        </li>

        <li>Paneer</li>
    </ul>
</section>

<!-- section for fighter jet -->
<section>
    <h1>Fighter Jet</h1>

    <!-- ordered list -->
    <ol>
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ol>
</section>

<!-- section for lassi ingredients -->
<section>
    <h1>Ingredients for Lassi</h1>

    <!-- ordered list with nested unordered -->
    <ol>
        <li>Curd</li>
        <li>Water</li>

        <li>Sugar
            <ul>
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </li>

        <li>Malai</li>
        <li>Kova</li>
    </ol>
</section>

</body>
</html>
